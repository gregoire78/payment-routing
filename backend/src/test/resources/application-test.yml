spring:
  datasource:
    url: jdbc:h2:mem:payment_routing_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

app:
  demo:
    seed-enabled: false
  mq:
    listener-enabled: false
    publish-max-attempts: 3
    publish-backoff-ms: 0
    publish-timeout-ms: 1500
    publish-circuit-failure-threshold: 5
    publish-circuit-open-ms: 30000
