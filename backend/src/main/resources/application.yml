spring:
  application:
    name: payment-routing-backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOSTNAME:localhost}:5432/${POSTGRES_DB:postgres}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:12}
      minimum-idle: ${DB_MIN_IDLE:4}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  demo:
    seed-enabled: ${APP_DEMO_SEED_ENABLED:true}
  mq:
    queue-manager: ${IBM_MQ_QUEUE_MANAGER:QM1}
    channel: ${IBM_MQ_CHANNEL:DEV.APP.SVRCONN}
    conn-name: ${IBM_MQ_CONN_NAME:ibmmq(1414)}
    queue-name: ${IBM_MQ_QUEUE_NAME:DEV.QUEUE.1}
    user: ${IBM_MQ_USER:app}
    password: ${IBM_MQ_PASSWORD:passw0rd}
    listener-enabled: ${APP_MQ_LISTENER_ENABLED:false}
    concurrency: ${APP_MQ_LISTENER_CONCURRENCY:2-6}

logging:
  level:
    com.bank.paymentrouting: INFO